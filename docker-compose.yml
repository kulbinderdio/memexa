services:

  # ── Memexa web app ─────────────────────────────────────────────────────────
  memexa:
    build: .
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - memexa-data:/root/.memexa-web
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Named volumes (persistent across restarts) ─────────────────────────────
volumes:
  memexa-data:     # SQLite database + uploaded PDFs
