services:

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Memexa web app ─────────────────────────────────────────────────────────
  memexa:
    build: .
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - memexa-data:/root/.memexa-web
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Named volumes (persistent across restarts) ─────────────────────────────
volumes:
  memexa-data:     # SQLite database + uploaded PDFs
  ollama-models:   # Downloaded Ollama models (~4–8 GB)
